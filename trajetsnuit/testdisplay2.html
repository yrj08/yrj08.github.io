<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Leaflet GeoJSON Multi-Layer Example</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map {
      height: 100vh;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script>

// ---------------- MAP SETUP ----------------

const map = L.map('map').setView([45.5017, -73.5673], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);


// ---------------- STYLE FUNCTIONS ----------------

// Line style (routes)
function outboundrouteStyle(feature) {
  return {
    color: feature.properties.color || "#000000",
    weight: 4
  };
}

// Line style (routes)
function inboundrouteStyle(feature) {
  return {
    color: feature.properties.color || "#6f6f6f",
    weight: 4
  };
}

// Bus stops
function busStopStyle(feature, latlng) {
  return L.circleMarker(latlng, {
    radius: 4,
    fillColor: "white",
    color: "#000000",
    weight: 3,
    fillOpacity: 1
  });
}

// Metro stations
function metroStopStyle(feature, latlng) {
  return L.circleMarker(latlng, {
    radius: 4,
    fillColor: "white",
    color: "#6f6f6f",
    weight: 3,
    fillOpacity: 1
  });
}


// ---------------- EMPTY LAYERS ----------------

const outboundroutesLayer = L.geoJSON(null, {
  style: outboundrouteStyle
});

const inboundroutesLayer = L.geoJSON(null, {
  style: inboundrouteStyle
});

const busStopsLayer = L.geoJSON(null, {
  pointToLayer: busStopStyle,
  onEachFeature: onEachFeature
});

const metroLayer = L.geoJSON(null, {
  pointToLayer: metroStopStyle,
  onEachFeature: onEachFeature
});


// ---------------- POPUPS ----------------

function onEachFeature(feature, layer) {
  if (feature.properties && feature.properties.name) {
    layer.bindPopup(feature.properties.name);
  }
}


// ---------------- LOAD GEOJSON ----------------

fetch("380.geojson")
  .then(res => res.json())
  .then(data => {

    const outboundroutes = [];
    const inboundroutes = [];
    const busStops = [];
    const metroStops = [];

    data.features.forEach(f => {

      if (f.geometry.type === "LineString") {
        if (f.properties.direction === "outbound") {
          outboundroutes.push(f);
        }

        if (f.properties.direction === "inbound") {
          inboundroutes.push(f);
        }
      }

      if (f.properties.direction === "outbound") {
        busStops.push(f);
      }

      if (f.properties.direction === "inbound") {
        metroStops.push(f);
      }

    });

    outboundroutesLayer.addData(outboundroutes);
    inboundroutesLayer.addData(inboundroutes);
    busStopsLayer.addData(busStops);
    metroLayer.addData(metroStops);

    // Add to map
    outboundroutesLayer.addTo(map);
    inboundroutesLayer.addTo(map);
    busStopsLayer.addTo(map);
    metroLayer.addTo(map);

    // Zoom to data
    map.fitBounds(outboundroutesLayer.getBounds());

  });


// ---------------- LAYER CONTROL ----------------

const overlayMaps = {
  "Routes1": outboundroutesLayer,
  "Routes2": inboundroutesLayer,
  "Bus Stops": busStopsLayer,
  "Metro Stations": metroLayer
};

L.control.layers(null, overlayMaps).addTo(map);

</script>

</body>
</html>
