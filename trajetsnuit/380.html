<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Leaflet GeoJSON Multi-Layer Example</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map {height: 100vh;}
  </style>
</head>

<body>

<div id="map"></div>

<script>

// ---------------- MAP SETUP ----------------

const map = L.map('map').setView([45.5017, -73.5673], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);


// ---------------- STYLE FUNCTIONS ----------------

// Line style (routes)
function routeStyle(feature) {
  return {
    color: feature.properties.color || "#3388ff",
    weight: 4
  };
}

// Outbound stops
function outboundStopStyle(feature, latlng) {
  return L.circleMarker(latlng, {
    radius: 5,
    fillColor: "#000000",
    color: "white",
    weight: 3,
    fillOpacity: 1
  });
}

// Inbound stops
function inboundStopStyle(feature, latlng) {
  return L.circleMarker(latlng, {
    radius: 5,
    fillColor: "#6f6f6f",
    color: "white",
    weight: 3,
    fillOpacity: 1
  });
}

function onEachFeature(feature, layer) {
  if (feature.properties && feature.properties.name) {
    layer.bindPopup(feature.properties.name);
  }
}

// ---------------- EMPTY LAYERS ----------------

const outboundShapeLayer = L.geoJSON(null, { style: routeStyle });
const inboundShapeLayer  = L.geoJSON(null, { style: routeStyle });

const outboundStopsLayer = L.geoJSON(null, {
  pointToLayer: outboundStopStyle,
  onEachFeature: onEachFeature
});

const inboundStopsLayer = L.geoJSON(null, {
  pointToLayer: inboundStopStyle,
  onEachFeature: onEachFeature
});


// ---------------- POPUPS ----------------

function onEachFeature(feature, layer) {
  if (feature.properties && feature.properties.name) {
    layer.bindPopup(feature.properties.name);
  }
}


// ---------------- LOAD GEOJSON ----------------

fetch("376.geojson")
  .then(res => res.json())
  .then(data => {

    const outboundShapes = [];
    const inboundShapes = [];
    const outboundStops = [];
    const inboundStops = [];

    data.features.forEach(f => {

      if (f.geometry.type === "LineString") {

        if (f.properties.direction === "outbound") {
          outboundShapes.push(f);}
  
        if (f.properties.direction === "inbound") {
          inboundShapes.push(f);}
      }

    if (f.geometry.type === "Point") {

      if (f.properties.stop_type === "outbound") {
        outboundStops.push(f);}

      if (f.properties.stop_type === "inbound") {
        inboundStops.push(f);}
    }

  });

    outboundShapeLayer.addData(outboundShapes).addTo(map);
    inboundShapeLayer.addData(inboundShapes).addTo(map);
    outboundStopsLayer.addData(outboundStops).addTo(map);
    inboundStopsLayer.addData(inboundStops).addTo(map);

<!--    // Add to map
    routesLayer.addTo(map);
    busStopsLayer.addTo(map);
    metroLayer.addTo(map);

    // Zoom to data
    map.fitBounds(routesLayer.getBounds());

  });-->

    // ✅ AUTO ZOOM (same logic as your working version)
    const bounds = L.featureGroup([
      outboundShapeLayer,
      inboundShapeLayer
    ]).getBounds();
  
    map.fitBounds(bounds);
  
  });



// ---------------- LAYER CONTROL ----------------

const overlayMaps = {
  "Outbound shape": outboundShapeLayer
  "Inbound Shape": inboundShapeLayer,
  "Outbound Stops": outboundStopsLayer,
  "INbound Staos": inboundStopsLayer
};

L.control.layers(null, overlays, { collapsed: false }).addTo(map);

</script>

</body>
</html>
