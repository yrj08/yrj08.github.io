<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Ligne 350</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="routeMap.js"></script>

<style>
#map { height: 100vh; }
</style>
</head>

<body>
<h1>Ligne 350 • Verdun / LaSalle</h1>
<div id="map"></div>

<script>
createRouteMap({
  geojsonFile: "350.geojson",
  outboundRouteLabel: "Tracé direction est",
  inboundRouteLabel: "Tracé direction ouest",
  outboundStopsLabel: "Arrêts direction est",
  inboundStopsLabel: "Arrêts direction ouest",
<!-- too pale #FBB268 #FFDEB2 -->
  branchStyles: {

    "current_outbound": {
      color: "#E28D1D",
      shape: "circle",
      radius: 3,
      weight: 8,
      opacity: 0.5
    },

    "current_inbound": {
      color: "#E28D1D",
      shape: "circle",
      radius: 3,
      weight: 8,
      opacity: 0.5
    },

    "added_outbound": {
      color: "#9C2DFB",
      shape: "circle",
      radius: 4,
      weight: 4,
      borderweight: 3
    },

    "added_inbound": {
      color: "#CF9CFF",
      shape: "circle",
      radius: 4,
      weight: 4, 
      borderweight: 3
    }

  }
  
});
</script>

<h2>Modifications proposées</h2>
<ul>
  <li>asdf</li>
</ul>

<h2>Raisonnement des modifications</h2>
<ul>
  <li>asdf</li>
</ul>
  
</body>
</html>
