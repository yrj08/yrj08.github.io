<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Ligne 354</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="routeMap.js"></script>

<style>
#map { height: 100vh; }
</style>
</head>

<body>
<h1>Ligne 354 • Des Sources / YUL Aéroport</h1>
<div id="map"></div>

<script>
createRouteMap({
  geojsonFile: "354.geojson",
  outboundRouteLabel: "Tracé direction est",
  inboundRouteLabel: "Tracé direction ouest",
  outboundStopsLabel: "Arrêts direction est",
  inboundStopsLabel: "Arrêts direction ouest",

  branchStyles: {

    "current_outbound": {
      color: "#FBB268",
      shape: "circle",
      radius: 3,
      weight: 8,
      opacity: 0.5
    },

    "current_inbound": {
      color: "#FBB268",
      shape: "circle",
      radius: 3,
      weight: 8,
      opacity: 0.5
    }
  }
});
</script>

</body>
</html>
