<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Réseau global</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map {
      height: 100vh;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script>

// ================= MAP SETUP =================

const map = L.map('map');

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);


// ================= PANES (LAYER ORDER) =================

// Rapid transit below
map.createPane("rapidTransitPane");
map.getPane("rapidTransitPane").style.zIndex = 400;

map.createPane("currentOutboundPane");
map.getPane("currentOutboundPane").style.zIndex = 450;
  
// Night routes above
map.createPane("nightRoutesPane");
map.getPane("nightRoutesPane").style.zIndex = 500;


// ================= CONFIG =================

// Night route files + display names
const routes = [
  { file: "350.geojson", name: "350 Verdun / LaSalle" },
  { file: "352.geojson", name: "352 Centrale" },
  { file: "353.geojson", name: "353 Lacordaire / Maurice-Duplessis" },
  { file: "354.geojson", name: "354 Des Sources / YUL Aéroport" },
  { file: "355.geojson", name: "355 Pie-IX" },
  { file: "356.geojson", name: "356 Sherbrooke / YUL Aéroport" },
  { file: "357.geojson", name: "357 Saint-Michel" },
  { file: "359.geojson", name: "359 Papineau" },
  { file: "361.geojson", name: "361 Saint-Denis" },
  { file: "362.geojson", name: "362 Hochelaga / Notre-Dame" },
  { file: "363.geojson", name: "363 Saint-Laurent" },
  { file: "364.geojson", name: "364 Sherbrooke / Joseph-Renaud" },
  { file: "365.geojson", name: "365 Du Parc" },
  { file: "368.geojson", name: "368 Édouard-Montpetit" },
  { file: "369.geojson", name: "369 Côte-des-Neiges" },
  { file: "370.geojson", name: "370 Rosemont" },
  { file: "371.geojson", name: "371 Décarie" },
  { file: "372.geojson", name: "372 Jean-Talon" },
  { file: "375.geojson", name: "375 Côte-de-Liesse / YUL Aéroport" },
  { file: "376.geojson", name: "376 Pierrefonds" },
  { file: "378.geojson", name: "378 Sauvé / Côte-Vertu" },
  { file: "380.geojson", name: "380 Henri-Bourassa" },
  { file: "382.geojson", name: "382 Pierrefonds / Saint-Charles" }
];

// Rapid transit color mapping
const rapidTransitColors = {
  verte: "#00B300",
  orange: "#D95700",
  bleue: "#0095E6",
  jaune: "#FFD900",
  rem: "#73A400",
  east_cancelled: "#FF2600",
  west_cancelled: "#FF2600",
  west_temporary: "#1F3BFF",
  east_temporary: "#1F3BFF"
  
};

const defaultNightColor = "#000000";


// ================= NIGHT ROUTE STYLE =================

function nightRouteStyle(feature) {

  const branch = feature.properties.branch;

  if (branch && rapidTransitColors[branch]) {
    return {
      color: rapidTransitColors[branch],
      weight: 3
    };
  }

  return {
    color: defaultNightColor,
    weight: 3
  };
}

function currentOutboundStyle(feature) {
  return {
    color: "#FBB268",
    weight: 8,
    opacity: 0.4
  };
}
<!--nightRouteStyle(feature).color,-->

// Highlight style
const highlightStyle = {
  weight: 7,
  opacity: 1
};

let activeRouteLayer = null;


// ================= LOAD NIGHT ROUTES =================

const allNightRoutesLayer = L.layerGroup().addTo(map);
let bounds = L.latLngBounds([]);

routes.forEach(route => {

  fetch(route.file)
    .then(res => res.json())
    .then(data => {

      const currentOutboundLayer = L.geoJSON(data, {

        pane: "currentOutboundPane",
      
        filter: function(feature) {
          return (
            feature.geometry.type === "LineString" &&
            feature.properties.branch === "current_outbound"
          );
        },
      
        style: currentOutboundStyle
      
      });
      
      currentOutboundLayer.addTo(allNightRoutesLayer);
      bounds.extend(currentOutboundLayer.getBounds());

      const routeLayer = L.geoJSON(data, {

        pane: "nightRoutesPane",
      
        filter: function(feature) {
          return (
            feature.geometry.type === "LineString" &&
            feature.properties.branch !== "current_outbound"
          );
        },
      
        style: nightRouteStyle,
      
        onEachFeature: function(feature, layer) {
      
          layer.bindPopup(route.name);
      
          layer.on("click", function() {
      
            if (activeRouteLayer) {
              activeRouteLayer.eachLayer(l => {
                l.setStyle(nightRouteStyle(l.feature));
              });
            }
      
            routeLayer.eachLayer(l => {
              l.setStyle({
                ...nightRouteStyle(l.feature),
                weight: 7,
                opacity: 1
              });
            });
      
            activeRouteLayer = routeLayer;
      
          });
      
        }
      
      });
      
      routeLayer.addTo(allNightRoutesLayer);
      bounds.extend(routeLayer.getBounds());
     
      if (bounds.isValid()) {
        map.fitBounds(bounds);
      }

    });

});


// ================= RAPID TRANSIT STYLE =================

function rapidTransitStyle(feature) {

  const branchName = feature.properties.branch;
  const color = rapidTransitColors[branchName] || "#000000";

  return {
    color: color,
    weight: 6,
    opacity: 0.9
  };
}

function rapidTransitStops(feature, latlng) {

  const branchName = feature.properties.branch;
  const color = rapidTransitColors[branchName] || "#000000";

  return L.circleMarker(latlng, {
    radius: 5,
    fillColor: color,
    color: color,
    weight: 4,
    fillOpacity: 1
  });
}


// ================= LOAD RAPID TRANSIT =================

fetch("modeslourds.geojson")
  .then(res => res.json())
  .then(data => {

    const rapidTransitLines = L.geoJSON(data, {

      pane: "rapidTransitPane",

      filter: function(feature) {
        return feature.geometry.type === "LineString";
      },

      style: rapidTransitStyle

    });

    const rapidTransitPoints = L.geoJSON(data, {

      pane: "rapidTransitPane",

      filter: function(feature) {
        return feature.geometry.type === "Point";
      },

      pointToLayer: rapidTransitStops

    });

    rapidTransitLines.addTo(map);
    rapidTransitPoints.addTo(map);

  });

</script>

</body>
</html>
