<!DOCTYPE html>
<html>
<head>
    <title>Leaflet Polyline TEST</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>#map { height: 500px; }</style>
</head>
<body>
  <h1>TESTTEST</h1>

  <p>Ligne 376 • Pierrefonds / Centre-Ville</p>
  
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize map
        const map = L.map('map').setView([45.4854545,-73.726357], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);



fetch("testdata.geojson")
  .then(res => res.json())
  .then(data => {
    L.geoJSON(data, {
      pointToLayer: (feature, latlng) =>
        L.circleMarker(latlng, { radius: 6, fillColor: "red", fillOpacity: 1, color: "#000", weight: 1 }),

      style: {
        color: "blue",
        weight: 4
      }
    }).addTo(map);
  });


    </script>
</body>
</html>
