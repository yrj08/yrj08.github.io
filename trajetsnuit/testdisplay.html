<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>System Overview Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map {
      height: 100vh;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script>

// ---------------- MAP SETUP ----------------

const map = L.map('map');

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);


// ---------------- CONFIG ----------------

// Add all route files here
const routes = [
  { file: "350.geojson", name: "350 Verdun / LaSalle" },
  { file: "352.geojson", name: "352 Centrale" },
  { file: "353.geojson", name: "353 Lacordaire / Maurice-Duplessis" },
  { file: "354.geojson", name: "354 Des Sources / YUL Aéroport" },
  { file: "355.geojson", name: "355 Pie-IX" },
  { file: "356.geojson", name: "356 Sherbrooke / YUL Aéroport" }
];

// Default color (used if no branch style defined)
const defaultColor = "#000000";

// Optional branch overrides
// Only define what you want to override
const branchStyles = {

  "A": { color: "#E4002B" },
  "B": { color: "#0072CE" },
  "EXP": { color: "#FF8C00" }

};


// ---------------- STYLE FUNCTION ----------------

function routeStyle(feature) {

  const branch = feature.properties.branch;

  if (branch && branchStyles[branch] && branchStyles[branch].color) {
    return {
      color: branchStyles[branch].color,
      weight: 3
    };
  }

  return {
    color: defaultColor,
    weight: 3
  };
}


// ---------------- LAYER GROUP ----------------

const allRoutesLayer = L.layerGroup().addTo(map);
let bounds = L.latLngBounds([]);


// ---------------- LOAD FILES ----------------

routes.forEach(route => {

  fetch(route.file)
    .then(res => res.json())
    .then(data => {

      const routeLayer = L.geoJSON(data, {

        filter: function(feature) {
          return feature.geometry.type === "LineString";
        },

        style: routeStyle,

        onEachFeature: function(feature, layer) {
          layer.bindPopup(route.name);
        }

      });

      routeLayer.addTo(allRoutesLayer);
      bounds.extend(routeLayer.getBounds());

      if (bounds.isValid()) {
        map.fitBounds(bounds);
      }

    });

});

</script>

</body>
</html>
