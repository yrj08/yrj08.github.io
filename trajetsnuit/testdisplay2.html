<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Leaflet GeoJSON Multi-Layer Example</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map {
      height: 100vh;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script>

// ---------------- MAP SETUP ----------------

const map = L.map('map').setView([45.5017, -73.5673], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);


// ---------------- STYLE FUNCTIONS ----------------

// Line style (routes)
function routeStyle(feature) {
  return {
    color: feature.properties.color || "#3388ff",
    weight: 4
  };
}

// Bus stops
function busStopStyle(feature, latlng) {
  return L.circleMarker(latlng, {
    radius: 5,
    fillColor: "blue",
    color: "white",
    weight: 1,
    fillOpacity: 1
  });
}

// Metro stations
function metroStopStyle(feature, latlng) {
  return L.circleMarker(latlng, {
    radius: 8,
    fillColor: "red",
    color: "black",
    weight: 2,
    fillOpacity: 1
  });
}


// ---------------- EMPTY LAYERS ----------------

const routesLayer = L.geoJSON(null, {
  style: routeStyle
});

const busStopsLayer = L.geoJSON(null, {
  pointToLayer: busStopStyle,
  onEachFeature: onEachFeature
});

const metroLayer = L.geoJSON(null, {
  pointToLayer: metroStopStyle,
  onEachFeature: onEachFeature
});


// ---------------- POPUPS ----------------

function onEachFeature(feature, layer) {
  if (feature.properties && feature.properties.name) {
    layer.bindPopup(feature.properties.name);
  }
}


// ---------------- LOAD GEOJSON ----------------

fetch("380.geojson")
  .then(res => res.json())
  .then(data => {

    const routes = [];
    const busStops = [];
    const metroStops = [];

    data.features.forEach(f => {

      if (f.geometry.type === "LineString") {
        routes.push(f);
      }

      if (f.properties.stop_type === "outbound") {
        busStops.push(f);
      }

      if (f.properties.stop_type === "inbound") {
        metroStops.push(f);
      }

    });

    routesLayer.addData(routes);
    busStopsLayer.addData(busStops);
    metroLayer.addData(metroStops);

    // Add to map
    routesLayer.addTo(map);
    busStopsLayer.addTo(map);
    metroLayer.addTo(map);

    // Zoom to data
    map.fitBounds(routesLayer.getBounds());

  });


// ---------------- LAYER CONTROL ----------------

const overlayMaps = {
  "Routes": routesLayer,
  "Bus Stops": busStopsLayer,
  "Metro Stations": metroLayer
};

L.control.layers(null, overlayMaps).addTo(map);

</script>

</body>
</html>
