<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Ligne 361</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="routeMap.js"></script>

<style>
#map { height: 100vh; }
</style>
</head>

<body>
<h1>Ligne 361 • Saint-Denis</h1>
  
<p><a href="#changements">Modifications proposées</a></p>
<p><a href="#pourquoi">Raisonnement des modifications</a></p>
  
<div id="map"></div>

<script>
createRouteMap({
  geojsonFile: "361.geojson",
  outboundRouteLabel: "Tracé direction nord",
  inboundRouteLabel: "Tracé direction sud",
  outboundStopsLabel: "Arrêts direction nord",
  inboundStopsLabel: "Arrêts direction sud",

  branchStyles: {

    "current_outbound": {
      color: "#E28D1D",
      shape: "circle",
      radius: 3,
      weight: 8,
      opacity: 0.5
    },

    "east_cancelled": {
      color: "#FF2600",
      shape: "circle",
      radius: 4,
      weight: 4
    },

    "west_cancelled": {
      color: "#FFA59B",
      shape: "circle",
      radius: 4,
      weight: 4
    },

    "east_temporary": {
      color: "#1F3BFF",
      shape: "circle",
      radius: 4,
      weight: 4
    },

    "west_temporary": {
      color: "#7498FF",
      shape: "circle",
      radius: 4,
      weight: 4
    }
    
  }

});
</script>

<h2 id="changements">Modifications proposées</h2>
<ul>
  <li></li>
  <li>Retrait de quelques arrêts trop rapprochés.</li>
</ul>

<h2 id="pourquoi">Raisonnement des modifications</h2>
<ul>
  <li></li>
  <li>Améliorer la vitesse commerciale et ponctualité en réduisant le 
    nombre d'arrêts.</li>
</ul>

</body>
</html>
