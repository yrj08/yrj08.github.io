<!DOCTYPE html>
<html>
<head>
    <title>Leaflet Polyline TEST</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>#map { height: 500px; }</style>
</head>
<body>
  <h1>TESTTEST</h1>

  <p>Ligne 376 • Pierrefonds / Centre-Ville</p>
  
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize map
        const map = L.map('map').setView([45.4854545,-73.726357], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const routesLayer = L.geoJSON(null, { style: routeStyle });
const busStopsLayer = L.geoJSON(null, { pointToLayer: busStyle });
const metroLayer = L.geoJSON(null, { pointToLayer: metroStyle });

fetch("data.geojson")
  .then(res => res.json())
  .then(data => {

    routesLayer.addData(data.features.filter(f => f.properties.type === "route"));

    busStopsLayer.addData(
      data.features.filter(f => f.properties.stop_type === "bus")
    );

    metroLayer.addData(
      data.features.filter(f => f.properties.stop_type === "metro")
    );

  });

routesLayer.addTo(map);
busStopsLayer.addTo(map);
metroLayer.addTo(map);

    </script>
</body>
</html>
