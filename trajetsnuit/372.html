<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Ligne 372</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="routeMap.js"></script>

<style>
#map { height: 100vh; }
</style>
</head>

<body>
<h1>Ligne 372 • Jean-Talon</h1>
<div id="map"></div>


<script>
createRouteMap({
  geojsonFile: "372.geojson",

  outboundRouteLabel: "Tracé direction est",
  inboundRouteLabel: "Tracé direction ouest",
  outboundStopsLabel: "Arrêts direction est",
  inboundStopsLabel: "Arrêts direction ouest",

  branchStyles: {

    "east_cancelled": {
      color: "#FF2600",
      shape: "circle",
      radius: 4,
      weight: 4
    },

    "west_cancelled": {
      color: "#FFA59B",
      shape: "circle",
      radius: 4,
      weight: 4
    },

    "east_temporary": {
      color: "#1F3BFF",
      shape: "circle",
      radius: 4,
      weight: 4
    },

    "west_temporary": {
      color: "#7498FF",
      shape: "circle",
      radius: 4,
      weight: 4
    }

  }

});
</script>

</body>
</html>
